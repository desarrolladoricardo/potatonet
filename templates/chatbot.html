<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICARDO - La Papa Sabia</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar-agropapa {
            background-color: var(--agropapa-green-main, #1B5E20) !important;
        }

        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
        }

        .chat-header {
            background-color: #fff;
            padding: 15px 25px;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
        }

        .ricardo-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4CAF50;
            margin-right: 15px;
        }

        .chat-header-info h4 {
            margin: 0;
            font-weight: 700;
            color: #1B5E20;
        }

        .chat-header-info p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #fcfcfc;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot {
            align-self: flex-start;
            background-color: #E8F5E9;
            color: #1B5E20;
            border-bottom-left-radius: 5px;
        }

        .message.user {
            align-self: flex-end;
            background-color: #1B5E20;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .chat-input-area {
            padding: 20px;
            background-color: #fff;
            border-top: 2px solid #eee;
        }

        .input-group {
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-radius: 30px;
            overflow: hidden;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #4CAF50;
        }

        .btn-send {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn-send:hover {
            background-color: #388E3C;
            color: white;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: #E8F5E9;
            padding: 12px 18px;
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            color: #1B5E20;
            font-style: italic;
            font-size: 0.9rem;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #1B5E20;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Go back button overlay */
        .btn-back {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- Back Button to Website -->
    <a href="{{ url_for('index') }}" class="btn btn-outline-success btn-back bg-white shadow-sm">
        <i class="fas fa-arrow-left me-2"></i>Volver a AgroPapa
    </a>

    <div class="container d-flex flex-column h-100 p-0 p-md-3">
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <img src="{{ url_for('static', filename='images/RICARDO.png') }}" alt="Ricardo Logo" class="ricardo-logo">
                <div class="chat-header-info">
                    <h4>RICARDO la papa sabia</h4>
                    <p>Asistente experto en cultivo de papas</p>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    ¡Qué más sumercé! Yo soy RICARDO, la papa sabia. ¿En qué le puedo colaborar el día de hoy con su cultivo de papita?
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    RICARDO está escribiendo<span></span><span></span><span></span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <form id="chatForm">
                    <div class="input-group">
                        <input type="text" id="messageInput" class="form-control form-control-lg border-0 bg-light" placeholder="Escribe tu pregunta sobre papas aquí, sumercé..." autocomplete="off">
                        <button class="btn btn-send" type="submit" id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');
        const sendBtn = document.getElementById('sendBtn');

        // Function to append message to chat
        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            // Render basic markdown (paragraphs, bold) to html, or just text content
            // Simple newline to br replacement for better text display
            let formattedText = text.replace(/\n/g, '<br>');
            // Simple bold rendering
            formattedText = formattedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            msgDiv.innerHTML = formattedText;
            
            // Insert before typing indicator
            chatMessages.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            appendMessage(message, 'user');
            messageInput.value = '';
            
            // Disable input while waiting
            messageInput.disabled = true;
            sendBtn.disabled = true;
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';
                
                if (response.ok) {
                    appendMessage(data.reply, 'bot');
                } else {
                    appendMessage(data.reply || 'Ops sumercé, algo salió mal.', 'bot');
                }
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage('Uy sumercé, me disculpa pero la mente me dio vueltas y no me pude conectar. Se nos cayó la señal del cultivo, inténtalo de nuevo más lueguito.', 'bot');
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        });
    </script>
</body>
</html>
